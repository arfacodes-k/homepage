<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snake</title>
<style>
  :root {
    --bg: #0f1117;
    --panel: #1a1d29;
    --accent: #5eead4;
    --accent2: #f472b6;
    --grid: #232636;
    --text: #e5e7eb;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: radial-gradient(circle at top, #1c2030, var(--bg));
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: var(--text);
  }
  h1 {
    letter-spacing: 4px;
    font-weight: 600;
    margin-bottom: 4px;
    color: var(--accent);
    text-shadow: 0 0 12px rgba(94,234,212,0.4);
  }
  #scoreboard {
    display: flex;
    gap: 24px;
    margin-bottom: 12px;
    font-size: 15px;
    color: #9ca3af;
  }
  #scoreboard span { color: var(--accent2); font-weight: 700; }
  #board-wrap {
    position: relative;
    background: var(--panel);
    padding: 14px;
    border-radius: 16px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
  }
  canvas {
    display: block;
    background: var(--grid);
    border-radius: 8px;
  }
  #overlay {
    position: absolute;
    top: 14px; left: 14px; right: 14px; bottom: 14px;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(15,17,23,0.85);
    border-radius: 8px;
    text-align: center;
    padding: 20px;
  }
  #overlay.show { display: flex; }
  #overlay h2 { margin: 0 0 6px; color: var(--accent2); }
  #overlay p { margin: 0 0 16px; color: #9ca3af; font-size: 14px; }
  button {
    background: var(--accent);
    border: none;
    padding: 10px 22px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 700;
    color: #0f1117;
    cursor: pointer;
    transition: transform 0.1s ease;
  }
  button:hover { transform: scale(1.05); }
  #hint {
    margin-top: 14px;
    font-size: 13px;
    color: #6b7280;
    text-align: center;
  }
  #mobile-controls {
    display: grid;
    grid-template-columns: repeat(3, 48px);
    grid-template-rows: repeat(3, 48px);
    gap: 6px;
    margin-top: 16px;
  }
  #mobile-controls button {
    width: 48px; height: 48px;
    font-size: 18px;
    background: var(--panel);
    color: var(--accent);
    border: 1px solid var(--grid);
  }
  .up { grid-column: 2; grid-row: 1; }
  .left { grid-column: 1; grid-row: 2; }
  .down { grid-column: 2; grid-row: 2; }
  .right { grid-column: 3; grid-row: 2; }
</style>
</head>
<body>

<h1>SNAKE</h1>
<div id="scoreboard">
  <div>Score: <span id="score">0</span></div>
  <div>Best: <span id="best">0</span></div>
</div>

<div id="board-wrap">
  <canvas id="game" width="400" height="400"></canvas>
  <div id="overlay" class="show">
    <h2 id="overlay-title">Ready?</h2>
    <p id="overlay-text">Use arrow keys or WASD to move. Eat the dots, avoid the walls and yourself.</p>
    <button id="overlay-btn">Start Game</button>
  </div>
</div>

<div id="hint">Arrow keys / WASD to move &nbsp;•&nbsp; Space to pause</div>

<div id="mobile-controls">
  <button class="up">▲</button>
  <button class="left">◀</button>
  <button class="down">▼</button>
  <button class="right">▶</button>
</div>

<script>
(function () {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const cell = 20;
  const cols = canvas.width / cell;
  const rows = canvas.height / cell;

  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  const overlay = document.getElementById('overlay');
  const overlayTitle = document.getElementById('overlay-title');
  const overlayText = document.getElementById('overlay-text');
  const overlayBtn = document.getElementById('overlay-btn');

  let best = Number(localStorage.getItem('snake-best') || 0);
  bestEl.textContent = best;

  let snake, dir, nextDir, food, score, speedMs, timer, running, paused;

  function resetState() {
    snake = [
      { x: 8, y: 10 },
      { x: 7, y: 10 },
      { x: 6, y: 10 }
    ];
    dir = { x: 1, y: 0 };
    nextDir = dir;
    score = 0;
    speedMs = 120;
    running = false;
    paused = false;
    scoreEl.textContent = score;
    placeFood();
  }

  function placeFood() {
    let candidate;
    do {
      candidate = {
        x: Math.floor(Math.random() * cols),
        y: Math.floor(Math.random() * rows)
      };
    } while (snake.some(s => s.x === candidate.x && s.y === candidate.y));
    food = candidate;
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // subtle grid
    ctx.strokeStyle = 'rgba(255,255,255,0.03)';
    for (let i = 0; i <= cols; i++) {
      ctx.beginPath();
      ctx.moveTo(i * cell, 0);
      ctx.lineTo(i * cell, canvas.height);
      ctx.stroke();
    }
    for (let j = 0; j <= rows; j++) {
      ctx.beginPath();
      ctx.moveTo(0, j * cell);
      ctx.lineTo(canvas.width, j * cell);
      ctx.stroke();
    }

    // food
    ctx.fillStyle = '#f472b6';
    ctx.shadowColor = '#f472b6';
    ctx.shadowBlur = 12;
    roundRect(food.x * cell + 3, food.y * cell + 3, cell - 6, cell - 6, 4);
    ctx.shadowBlur = 0;

    // snake
    snake.forEach((seg, i) => {
      ctx.fillStyle = i === 0 ? '#5eead4' : `rgba(94,234,212,${Math.max(0.35, 1 - i * 0.05)})`;
      roundRect(seg.x * cell + 1, seg.y * cell + 1, cell - 2, cell - 2, 5);
    });
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
    ctx.fill();
  }

  function tick() {
    if (!running || paused) return;

    dir = nextDir;
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    // wall collision
    if (head.x < 0 || head.x >= cols || head.y < 0 || head.y >= rows) {
      return gameOver();
    }
    // self collision
    if (snake.some(s => s.x === head.x && s.y === head.y)) {
      return gameOver();
    }

    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
      score += 10;
      scoreEl.textContent = score;
      placeFood();
      if (speedMs > 60) speedMs -= 3;
      restartLoop();
    } else {
      snake.pop();
    }

    draw();
  }

  function restartLoop() {
    clearInterval(timer);
    timer = setInterval(tick, speedMs);
  }

  function gameOver() {
    running = false;
    clearInterval(timer);
    if (score > best) {
      best = score;
      localStorage.setItem('snake-best', best);
      bestEl.textContent = best;
    }
    overlayTitle.textContent = 'Game Over';
    overlayText.textContent = `Score: ${score} — press Start to try again.`;
    overlayBtn.textContent = 'Play Again';
    overlay.classList.add('show');
  }

  function startGame() {
    resetState();
    overlay.classList.remove('show');
    running = true;
    draw();
    restartLoop();
  }

  function setDirection(x, y) {
    // prevent reversing directly into itself
    if (snake.length > 1 && dir.x === -x && dir.y === -y) return;
    nextDir = { x, y };
  }

  document.addEventListener('keydown', (e) => {
    switch (e.key) {
      case 'ArrowUp': case 'w': case 'W': setDirection(0, -1); break;
      case 'ArrowDown': case 's': case 'S': setDirection(0, 1); break;
      case 'ArrowLeft': case 'a': case 'A': setDirection(-1, 0); break;
      case 'ArrowRight': case 'd': case 'D': setDirection(1, 0); break;
      case ' ':
        if (running) {
          paused = !paused;
          if (!paused) restartLoop(); else clearInterval(timer);
        }
        break;
    }
  });

  document.querySelector('.up').addEventListener('click', () => setDirection(0, -1));
  document.querySelector('.down').addEventListener('click', () => setDirection(0, 1));
  document.querySelector('.left').addEventListener('click', () => setDirection(-1, 0));
  document.querySelector('.right').addEventListener('click', () => setDirection(1, 0));

  overlayBtn.addEventListener('click', startGame);

  resetState();
  draw();
})();
</script>

</body>
</html>
