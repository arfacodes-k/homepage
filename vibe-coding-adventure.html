<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Vibe Coding Adventure 🚀</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Bubblegum+Sans&family=Baloo+2:wght@500;700;800&display=swap" rel="stylesheet">
<style>
/* ============================================================
   VIBE CODING ADVENTURE — A Fun Learning Site for Kids
   ============================================================ */

/* ---- DESIGN TOKENS ---- */
:root {
  --sky:        #a8d8ff;
  --sky-dark:   #7bc0f5;
  --grass:      #7eda7e;
  --grass-dark: #4fc04f;
  --sun:        #ffd93d;
  --sun-glow:   #ffb703;
  --bubble:     #ff6fb7;
  --bubble-dark:#e04598;
  --purple:     #b983ff;
  --purple-dark:#8c5ce6;
  --orange:     #ff8c42;
  --orange-dark:#e67320;
  --teal:       #42e6d8;
  --teal-dark:  #2bc0b2;
  --red:        #ff5e5e;
  --red-dark:   #e04040;
  --white:      #ffffff;
  --cream:      #fff8e7;
  --dark-text:  #2d1b4e;
  --shadow:     0 6px 24px rgba(0,0,0,0.12);
  --shadow-big: 0 10px 40px rgba(0,0,0,0.18);
  --radius:     20px;
  --radius-sm:  14px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  overflow-x: hidden;
  font-family: 'Baloo 2', sans-serif;
  background: linear-gradient(180deg, var(--sky) 0%, var(--sky-dark) 60%, var(--grass) 60%, var(--grass-dark) 100%);
  color: var(--dark-text);
}

/* ---- SCROLLBAR (cute) ---- */
::-webkit-scrollbar { width: 10px; }
::-webkit-scrollbar-track { background: var(--cream); border-radius: 10px; }
::-webkit-scrollbar-thumb { background: var(--bubble); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: var(--bubble-dark); }

/* ---- UTILITY ---- */
.hidden { display: none !important; }

/* ============================================================
   HEADER / NAV
   ============================================================ */
header {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  background: rgba(255,255,255,0.88);
  backdrop-filter: blur(10px);
  padding: 10px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: 0 4px 20px rgba(0,0,0,0.08);
}

.logo {
  font-family: 'Fredoka One', cursive;
  font-size: 22px;
  display: flex;
  align-items: center;
  gap: 6px;
  color: var(--dark-text);
}

.logo span { background: var(--sun); padding: 2px 10px; border-radius: 30px; font-size: 14px; }

#star-count {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 20px;
  font-weight: 700;
  background: var(--cream);
  padding: 4px 16px 4px 12px;
  border-radius: 30px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}

.star-icon { font-size: 24px; }

/* ---- Back to Homepage button ---- */
.back-home-btn {
  font-size: 24px;
  text-decoration: none;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 38px;
  height: 38px;
  border-radius: 50%;
  background: var(--cream);
  transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}

.back-home-btn:hover {
  transform: scale(1.2) rotate(-8deg);
  background: var(--sun);
  box-shadow: 0 4px 12px rgba(255,217,61,0.4);
}

/* ---- NAV TABS ---- */
nav {
  display: flex;
  gap: 4px;
  background: var(--cream);
  padding: 4px;
  border-radius: 30px;
}

nav button {
  font-family: 'Baloo 2', sans-serif;
  font-size: 14px;
  font-weight: 700;
  padding: 6px 14px;
  border: none;
  border-radius: 30px;
  cursor: pointer;
  transition: all 0.2s ease;
  background: transparent;
  color: var(--dark-text);
}

nav button.active {
  background: var(--sun);
  color: var(--dark-text);
  box-shadow: 0 2px 8px rgba(255,217,61,0.5);
}

nav button:hover:not(.active) { background: rgba(255,217,61,0.3); }

/* ============================================================
   MAIN CONTENT AREA
   ============================================================ */
main {
  margin-top: 70px;
  padding: 16px;
  min-height: calc(100vh - 70px);
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ---- SECTION (each page) ---- */
.section {
  width: 100%;
  max-width: 800px;
  display: none;
  flex-direction: column;
  align-items: center;
  animation: fadeUp 0.4s ease;
}

.section.active { display: flex; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ============================================================
   HERO / HOME PAGE
   ============================================================ */
#home {
  text-align: center;
  padding-top: 20px;
}

#home h1 {
  font-family: 'Fredoka One', cursive;
  font-size: clamp(36px, 8vw, 60px);
  line-height: 1.2;
  margin-bottom: 6px;
}

#home h1 .a { color: var(--bubble); text-shadow: 3px 3px 0 var(--bubble-dark); }
#home h1 .b { color: var(--purple); text-shadow: 3px 3px 0 var(--purple-dark); }
#home h1 .c { color: var(--orange); text-shadow: 3px 3px 0 var(--orange-dark); }
#home h1 .d { color: var(--teal);   text-shadow: 3px 3px 0 var(--teal-dark); }
#home h1 .e { color: var(--red);    text-shadow: 3px 3px 0 var(--red-dark); }
#home h1 .f { color: var(--sun);    text-shadow: 3px 3px 0 var(--sun-glow); }

/* Mascot */
#mascot {
  font-size: 80px;
  display: inline-block;
  animation: bounce 2s ease-in-out infinite;
  margin: 4px 0;
  filter: drop-shadow(0 4px 12px rgba(255,217,61,0.4));
}

@keyframes bounce {
  0%, 100% { transform: translateY(0) scale(1); }
  50%      { transform: translateY(-14px) scale(1.06); }
}

.tagline {
  font-size: clamp(18px, 3vw, 24px);
  color: var(--dark-text);
  opacity: 0.8;
  margin-bottom: 16px;
  font-weight: 700;
}

/* ---- MODULE GRID ---- */
.module-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 14px;
  width: 100%;
  max-width: 750px;
  margin: 10px 0 20px;
}

.module-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 18px 14px 16px;
  text-align: center;
  cursor: pointer;
  transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  box-shadow: var(--shadow);
  position: relative;
  overflow: hidden;
  border: 3px solid transparent;
}

.module-card:hover {
  transform: translateY(-6px) scale(1.02);
  box-shadow: var(--shadow-big);
}

.module-card.completed {
  border-color: var(--sun);
  background: linear-gradient(135deg, #fffdf0, #fff8e7);
}

.module-card .emoji-big {
  font-size: 44px;
  display: block;
  margin-bottom: 4px;
}

.module-card h3 {
  font-family: 'Fredoka One', cursive;
  font-size: 18px;
  margin-bottom: 2px;
}

.module-card p {
  font-size: 13px;
  opacity: 0.7;
  line-height: 1.3;
}

.module-card .check {
  position: absolute;
  top: 8px;
  right: 10px;
  font-size: 22px;
  display: none;
}

.module-card.completed .check { display: block; }

.module-card .card-bg {
  position: absolute;
  inset: 0;
  opacity: 0.08;
  font-size: 80px;
  display: flex;
  align-items: flex-end;
  justify-content: flex-end;
  padding: 8px;
  pointer-events: none;
}

/* ============================================================
   LESSON PAGE (generic styling for all modules)
   ============================================================ */
.lesson-page {
  width: 100%;
  max-width: 780px;
  background: var(--white);
  border-radius: var(--radius);
  padding: 24px 20px 30px;
  box-shadow: var(--shadow-big);
  margin-top: 6px;
}

.lesson-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
}

.lesson-header .big-icon { font-size: 40px; }

.lesson-header h2 {
  font-family: 'Fredoka One', cursive;
  font-size: clamp(22px, 4vw, 30px);
  flex: 1;
}

.back-btn {
  font-family: 'Baloo 2', sans-serif;
  font-size: 16px;
  font-weight: 700;
  padding: 8px 18px;
  border: none;
  border-radius: 30px;
  background: var(--cream);
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 4px;
}

.back-btn:hover { background: #eee3cc; transform: scale(1.04); }

.lesson-content {
  min-height: 200px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.lesson-content p.instruction {
  font-size: 17px;
  font-weight: 700;
  color: var(--purple-dark);
  text-align: center;
  line-height: 1.5;
}

/* ---- Activity area (where the fun happens) ---- */
.activity-area {
  background: var(--cream);
  border-radius: var(--radius-sm);
  padding: 20px;
  min-height: 180px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  position: relative;
}

/* ---- Cute action button ---- */
.cute-btn {
  font-family: 'Baloo 2', sans-serif;
  font-size: 20px;
  font-weight: 800;
  padding: 12px 30px;
  border: none;
  border-radius: 40px;
  cursor: pointer;
  transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
  color: var(--white);
  box-shadow: 0 4px 0 rgba(0,0,0,0.15);
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

.cute-btn:hover { transform: translateY(-3px) scale(1.03); }
.cute-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 rgba(0,0,0,0.15); }

.cute-btn.pink  { background: linear-gradient(135deg, var(--bubble), var(--bubble-dark)); }
.cute-btn.purple{ background: linear-gradient(135deg, var(--purple), var(--purple-dark)); }
.cute-btn.orange{ background: linear-gradient(135deg, var(--orange), var(--orange-dark)); }
.cute-btn.teal  { background: linear-gradient(135deg, var(--teal), var(--teal-dark)); }
.cute-btn.red   { background: linear-gradient(135deg, var(--red), var(--red-dark)); }
.cute-btn.yellow{ background: linear-gradient(135deg, var(--sun), var(--sun-glow)); color: var(--dark-text); }
.cute-btn.green { background: linear-gradient(135deg, var(--grass), var(--grass-dark)); }
.cute-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }

/* ---- Completion badge ---- */
.completion-badge {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 12px;
  animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.completion-badge.show { display: flex; }

@keyframes popIn {
  0%   { transform: scale(0); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}

.completion-badge .big { font-size: 48px; }
.completion-badge .text {
  font-family: 'Fredoka One', cursive;
  font-size: 22px;
  color: var(--sun-glow);
  text-shadow: 2px 2px 0 rgba(0,0,0,0.1);
}

/* ---- Confetti canvas (hidden overlay) ---- */
#confetti-canvas {
  position: fixed;
  top: 0; left: 0;
  width: 100vw; height: 100vh;
  pointer-events: none;
  z-index: 999;
}

/* ============================================================
   MODULE 1: WHAT IS CODE? — Feed instructions
   ============================================================ */
#module1 .code-commands {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
}

#module1 .code-commands button {
  font-family: 'Baloo 2', sans-serif;
  font-size: 18px;
  font-weight: 700;
  padding: 10px 18px;
  border: 3px solid var(--purple);
  border-radius: 16px;
  background: var(--white);
  cursor: pointer;
  transition: all 0.2s;
}

#module1 .code-commands button:hover {
  background: var(--purple);
  color: var(--white);
  transform: scale(1.05);
}

#module1 .code-commands button:active { transform: scale(0.95); }

#module1 .code-commands button.used {
  opacity: 0.4;
  pointer-events: none;
}

#module1 .character-stage {
  width: 100%;
  height: 120px;
  background: linear-gradient(180deg, var(--sky) 0%, var(--grass) 100%);
  border-radius: var(--radius-sm);
  position: relative;
  overflow: hidden;
}

#module1 .character-stage .char {
  position: absolute;
  bottom: 10px;
  font-size: 50px;
  transition: left 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}

#module1 .character-stage .goal {
  position: absolute;
  bottom: 16px;
  right: 20px;
  font-size: 36px;
  opacity: 0.6;
}

/* ============================================================
   MODULE 2: PATTERN MAKER
   ============================================================ */
#module2 .color-palette {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
}

#module2 .color-palette .swatch {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  cursor: pointer;
  border: 4px solid transparent;
  transition: all 0.2s;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

#module2 .color-palette .swatch:hover { transform: scale(1.15); border-color: var(--dark-text); }
#module2 .color-palette .swatch.selected { border-color: var(--dark-text); transform: scale(1.1); }

#module2 .pattern-grid {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  justify-content: center;
  background: var(--white);
  padding: 12px;
  border-radius: var(--radius-sm);
  min-height: 60px;
}

#module2 .pattern-grid .cell {
  width: 44px;
  height: 44px;
  border-radius: 10px;
  transition: all 0.2s;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}

#module2 .pattern-grid .cell.filled {
  animation: popCell 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}

@keyframes popCell {
  0%   { transform: scale(0); }
  100% { transform: scale(1); }
}

#module2 .repeat-btn-area {
  display: flex;
  gap: 10px;
  align-items: center;
}

/* ============================================================
   MODULE 3: DANCE PARTY
   ============================================================ */
#module3 .dance-stage {
  width: 100%;
  min-height: 180px;
  background: radial-gradient(circle at center, #ffe0f0, #ffc0e0);
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

#module3 .dance-stage .dancer {
  font-size: 72px;
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}

#module3 .dance-stage .dancer.jump  { transform: translateY(-30px) scale(1.1); }
#module3 .dance-stage .dancer.spin  { transform: rotate(360deg) scale(1.1); }
#module3 .dance-stage .dancer.wiggle { animation: wiggle 0.3s ease 3; }
#module3 .dance-stage .dancer.wave  { animation: wave 0.5s ease 3; }

@keyframes wiggle {
  0%, 100% { transform: rotate(0deg); }
  25%      { transform: rotate(-20deg); }
  75%      { transform: rotate(20deg); }
}

@keyframes wave {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  50%      { transform: translateY(-20px) rotate(10deg); }
}

#module3 .dance-cards {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
}

#module3 .dance-cards .card {
  font-family: 'Baloo 2', sans-serif;
  font-size: 16px;
  font-weight: 700;
  padding: 10px 16px;
  border: 3px solid var(--bubble);
  border-radius: 16px;
  background: var(--white);
  cursor: pointer;
  transition: all 0.2s;
}

#module3 .dance-cards .card:hover {
  background: var(--bubble);
  color: var(--white);
  transform: scale(1.06);
}

#module3 .dance-cards .card:active { transform: scale(0.92); }

#module3 .sequence-display {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  justify-content: center;
  min-height: 40px;
  padding: 8px;
  background: var(--white);
  border-radius: var(--radius-sm);
}

#module3 .sequence-display .seq-item {
  font-size: 24px;
  background: var(--cream);
  padding: 4px 12px;
  border-radius: 10px;
  animation: popCell 0.2s ease;
}

/* ============================================================
   MODULE 4: COLOR MAGIC
   ============================================================ */
#module4 .color-sliders {
  display: flex;
  flex-direction: column;
  gap: 10px;
  width: 100%;
  max-width: 350px;
}

#module4 .color-sliders .slider-row {
  display: flex;
  align-items: center;
  gap: 10px;
}

#module4 .color-sliders .slider-row label {
  font-size: 20px;
  min-width: 30px;
}

#module4 .color-sliders input[type="range"] {
  flex: 1;
  height: 10px;
  -webkit-appearance: none;
  appearance: none;
  border-radius: 10px;
  outline: none;
}

#module4 .color-sliders input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 24px;
  height: 24px;
  border-radius: 50%;
  cursor: pointer;
  border: 3px solid var(--white);
  box-shadow: 0 2px 6px rgba(0,0,0,0.2);
}

#module4 .color-sliders input[type="range"]::-moz-range-thumb {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  cursor: pointer;
  border: 3px solid var(--white);
  box-shadow: 0 2px 6px rgba(0,0,0,0.2);
}

#module4 .color-sliders .r-slider { background: linear-gradient(90deg, #ffcccc, #ff0000); }
#module4 .color-sliders .g-slider { background: linear-gradient(90deg, #ccffcc, #00ff00); }
#module4 .color-sliders .b-slider { background: linear-gradient(90deg, #ccccff, #0000ff); }
#module4 .color-sliders .r-slider::-webkit-slider-thumb { background: #ff0000; }
#module4 .color-sliders .g-slider::-webkit-slider-thumb { background: #00ff00; }
#module4 .color-sliders .b-slider::-webkit-slider-thumb { background: #0000ff; }
#module4 .color-sliders .r-slider::-moz-range-thumb { background: #ff0000; }
#module4 .color-sliders .g-slider::-moz-range-thumb { background: #00ff00; }
#module4 .color-sliders .b-slider::-moz-range-thumb { background: #0000ff; }

#module4 .color-sliders .val {
  font-size: 18px;
  font-weight: 700;
  min-width: 36px;
  text-align: right;
}

#module4 .color-preview {
  width: 120px;
  height: 120px;
  border-radius: 20px;
  border: 4px solid var(--white);
  box-shadow: 0 4px 16px rgba(0,0,0,0.15);
  transition: background 0.15s;
}

#module4 .color-hex {
  font-family: 'Courier New', monospace;
  font-size: 20px;
  font-weight: 700;
  background: var(--dark-text);
  color: var(--white);
  padding: 6px 18px;
  border-radius: 12px;
}

/* ============================================================
   MODULE 5: SHAPE BUILDER — Loops
   ============================================================ */
#module5 .shape-grid-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}

#module5 .shape-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
  background: var(--white);
  padding: 8px;
  border-radius: var(--radius-sm);
  width: 220px;
}

#module5 .shape-grid .s-cell {
  aspect-ratio: 1;
  border-radius: 8px;
  background: #e8e0f0;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
}

#module5 .shape-grid .s-cell:hover { transform: scale(1.08); }
#module5 .shape-grid .s-cell.filled {
  animation: popCell 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}

#module5 .loop-controls {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
  justify-content: center;
}

#module5 .loop-controls label {
  font-size: 18px;
  font-weight: 700;
}

#module5 .loop-controls input {
  width: 60px;
  padding: 6px 10px;
  font-family: 'Baloo 2', sans-serif;
  font-size: 20px;
  font-weight: 700;
  border: 3px solid var(--teal);
  border-radius: 12px;
  text-align: center;
}

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media (max-width: 600px) {
  header { padding: 8px 12px; }
  .logo { font-size: 18px; }
  #star-count { font-size: 16px; padding: 2px 12px 2px 8px; }
  .module-grid { grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; }
  .module-card { padding: 14px 10px; }
  .module-card .emoji-big { font-size: 34px; }
  .module-card h3 { font-size: 15px; }
  .lesson-page { padding: 16px; }
  #module4 .color-preview { width: 80px; height: 80px; }
  #module5 .shape-grid { width: 180px; }
  #module5 .shape-grid .s-cell { font-size: 18px; }
}

/* ---- Floating background objects ---- */
.bg-floats {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: -1;
  overflow: hidden;
}

.bg-floats .float {
  position: absolute;
  font-size: 30px;
  opacity: 0.3;
  animation: floatAround 20s linear infinite;
}

.bg-floats .float:nth-child(1) { top: 10%; left: 5%; font-size: 40px; animation-duration: 22s; }
.bg-floats .float:nth-child(2) { top: 30%; right: 8%; font-size: 28px; animation-duration: 18s; animation-delay: -5s; }
.bg-floats .float:nth-child(3) { top: 60%; left: 3%; font-size: 34px; animation-duration: 25s; animation-delay: -10s; }
.bg-floats .float:nth-child(4) { top: 80%; right: 5%; font-size: 24px; animation-duration: 20s; animation-delay: -3s; }
.bg-floats .float:nth-child(5) { top: 50%; left: 60%; font-size: 36px; animation-duration: 24s; animation-delay: -8s; }
.bg-floats .float:nth-child(6) { top: 15%; right: 30%; font-size: 26px; animation-duration: 19s; animation-delay: -12s; }

@keyframes floatAround {
  0%   { transform: translate(0, 0) rotate(0deg); }
  25%  { transform: translate(30px, -20px) rotate(90deg); }
  50%  { transform: translate(-20px, 30px) rotate(180deg); }
  75%  { transform: translate(20px, -10px) rotate(270deg); }
  100% { transform: translate(0, 0) rotate(360deg); }
}
</style>
</head>
<body>

<div class="bg-floats">

  <div class="float">🎈</div>

<!-- ============================================================

<!-- ============================================================

<header>

<main>

  <!-- ===== HOME PAGE ===== -->
  <section id="home" class="section active">
    <div id="mascot">🌟</div>
    <h1>
      <span class="a">V</span><span class="b">i</span><span class="c">b</span><span class="d">e</span>
      <span class="e">C</span><span class="f">o</span><span class="a">d</span><span class="b">i</span><span class="c">n</span><span class="d">g</span>
      <span class="e">🌟</span>
    </h1>

    </div>

  <!-- ===== MODULE PAGES (dynamically filled by JS) ===== -->
  <div id="module-pages"></div>

</main>

<script>
/* ============================================================
   VIBE CODING ADVENTURE — Full JavaScript
   ============================================================ */

// ---- MODULE DATA ----
const MODULES = [
  {
    id: 'module1',
    emoji: '📝',
    title: 'What is Code?',
    desc: 'Code is giving instructions! Feed steps to a character and watch them go.',
    color: '#b983ff',
  },
  {
    id: 'module2',
    emoji: '🎨',
    title: 'Pattern Maker',
    desc: 'Make repeating patterns. Computers love to repeat things!',
    color: '#ff6fb7',
  },
  {
    id: 'module3',
    emoji: '💃',
    title: 'Dance Party',
    desc: 'Give step-by-step dance commands to your groovy dancer!',
    color: '#ff8c42',
  },
  {
    id: 'module4',
    emoji: '🌈',
    title: 'Color Magic',
    desc: 'Mix colors with sliders. See how RGB makes every color!',
    color: '#42e6d8',
  },
  {
    id: 'module5',
    emoji: '🔷',
    title: 'Shape Builder',
    desc: 'Place one shape, then loops fill the rest automatically!',
    color: '#ff5e5e',
  },
];

// ---- STATE ----
let completed = {};
try {
  const saved = localStorage.getItem('vibeCodingStars');
  if (saved) completed = JSON.parse(saved);
} catch(e) {}

const totalModules = MODULES.length;

// ---- DOM REFS ----
const homeGrid = document.getElementById('home-module-grid');
const lessonGrid = document.getElementById('lesson-module-grid');
const modulePages = document.getElementById('module-pages');
const starNum = document.getElementById('star-num');
const confettiCanvas = document.getElementById('confetti-canvas');
const ctx = confettiCanvas.getContext('2d');

// ---- CONFETTI ----
let confettiPieces = [];
let confettiAnimating = false;

function resizeConfetti() {
  confettiCanvas.width = window.innerWidth;
  confettiCanvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeConfetti);
resizeConfetti();

function launchConfetti() {
  const colors = ['#ff6fb7','#ffd93d','#b983ff','#42e6d8','#ff8c42','#ff5e5e','#7eda7e'];
  confettiPieces = [];
  for (let i = 0; i < 120; i++) {
    confettiPieces.push({
      x: Math.random() * confettiCanvas.width,
      y: -20 - Math.random() * 200,
      w: 6 + Math.random() * 8,
      h: 6 + Math.random() * 8,
      color: colors[Math.floor(Math.random() * colors.length)],
      speed: 2 + Math.random() * 4,
      rot: Math.random() * 360,
      rSpeed: (Math.random() - 0.5) * 8,
      drift: (Math.random() - 0.5) * 2,
    });
  }
  if (!confettiAnimating) {
    confettiAnimating = true;
    animateConfetti();
  }
}

function animateConfetti() {
  ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
  let remaining = false;
  for (const p of confettiPieces) {
    if (p.y > confettiCanvas.height + 40) continue;
    remaining = true;
    p.y += p.speed;
    p.x += p.drift + Math.sin(p.y * 0.02) * 0.5;
    p.rot += p.rSpeed;
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot * Math.PI / 180);
    ctx.fillStyle = p.color;
    ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
    ctx.restore();
  }
  if (remaining) {
    requestAnimationFrame(animateConfetti);
  } else {
    confettiAnimating = false;
    ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
  }
}

// ---- UPDATE STARS ----
function updateStars() {
  const count = Object.keys(completed).length;
  starNum.textContent = count;
  renderModuleCards();
}

// ---- RENDER MODULE CARDS (both grids + lesson pages) ----
function renderModuleCards() {
  const makeCard = (mod, forHome) => {
    const done = !!completed[mod.id];
    const card = document.createElement('div');
    card.className = 'module-card' + (done ? ' completed' : '');
    card.style.borderColor = done ? '#ffd93d' : 'transparent';
    card.innerHTML = `
      <span class="check">✅</span>
      <span class="emoji-big">${mod.emoji}</span>
      <h3>${mod.title}</h3>
      <p>${mod.desc}</p>
      <div class="card-bg">${mod.emoji}</div>
    `;
    card.addEventListener('click', () => openModule(mod.id));
    return card;
  };

  homeGrid.innerHTML = '';
  lessonGrid.innerHTML = '';
  for (const mod of MODULES) {
    homeGrid.appendChild(makeCard(mod, true));
    lessonGrid.appendChild(makeCard(mod, false));
  }
}

// ---- SHOW PAGE (tab navigation) ----
function showPage(page) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById(page).classList.add('active');
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.querySelector(`nav button[data-page="${page}"]`).classList.add('active');
}

// ---- OPEN MODULE ----
function openModule(id) {
  // Show the module page, or create if needed
  let el = document.getElementById('module-page-' + id);
  if (!el) {
    el = createModulePage(id);
  }
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  el.classList.add('active');
  // Don't highlight any nav tab
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
}

// ---- GO BACK TO LESSONS ----
function goBackToLessons() {
  showPage('lessons');
}

// ---- COMPLETE MODULE ----
function completeModule(id) {
  completed[id] = true;
  localStorage.setItem('vibeCodingStars', JSON.stringify(completed));
  updateStars();
  launchConfetti();

  // Show completion badge on the module page
  const badge = document.querySelector(`#module-page-${id} .completion-badge`);
  if (badge) badge.classList.add('show');

  // Check if all done
  if (Object.keys(completed).length === totalModules) {
    setTimeout(() => {
      launchConfetti();
      setTimeout(launchConfetti, 400);
      setTimeout(launchConfetti, 800);
    }, 600);
  }
}

// ============================================================
// CREATE MODULE PAGES
// ============================================================

function createModulePage(id) {
  const mod = MODULES.find(m => m.id === id);
  if (!mod) return null;

  const container = document.createElement('div');
  container.id = 'module-page-' + id;
  container.className = 'section';

  const lessonDiv = document.createElement('div');
  lessonDiv.className = 'lesson-page';

  // Header
  const header = document.createElement('div');
  header.className = 'lesson-header';
  header.innerHTML = `
    <span class="big-icon">${mod.emoji}</span>
    <h2>${mod.title}</h2>
    <button class="back-btn" onclick="goBackToLessons()">← Back</button>
  `;
  lessonDiv.appendChild(header);

  // Content wrapper
  const content = document.createElement('div');
  content.className = 'lesson-content';
  content.id = 'content-' + id;

  // Build module-specific content
  buildModuleContent(id, content);

  lessonDiv.appendChild(content);

  // Completion badge (hidden)
  const badge = document.createElement('div');
  badge.className = 'completion-badge';
  badge.innerHTML = `
    <span class="big">🎉</span>
    <span class="text">Awesome! You did it! ⭐</span>
  `;
  if (completed[id]) badge.classList.add('show');
  lessonDiv.appendChild(badge);

  container.appendChild(lessonDiv);
  modulePages.appendChild(container);
  return container;
}

// ============================================================
// MODULE 1: WHAT IS CODE?
// ============================================================
function buildModuleContent(id, container) {
  if (id === 'module1') buildModule1(container);
  else if (id === 'module2') buildModule2(container);
  else if (id === 'module3') buildModule3(container);
  else if (id === 'module4') buildModule4(container);
  else if (id === 'module5') buildModule5(container);
}

function buildModule1(container) {
  container.innerHTML = `
    <p class="instruction">
      🐣 Give <strong>Vibey</strong> instructions to reach the 🌟 goal!
      <br><small style="opacity:0.6">Click the commands in order to move Vibey.</small>
    </p>
    <div class="code-commands" id="m1-commands">
      <button data-action="step">🚶 Step Forward</button>
      <button data-action="jump">🦘 Jump</button>
      <button data-action="spin">🌀 Spin</button>
      <button data-action="hop">🐰 Big Hop</button>
    </div>
    <div class="character-stage" id="m1-stage">
      <div class="char" id="m1-char" style="left:20px;">🌟</div>
      <div class="goal">🏁</div>
    </div>
    <div style="display:flex; gap:8px; flex-wrap:wrap; justify-content:center;">
      <button class="cute-btn purple" id="m1-go">▶ Run Code!</button>
      <button class="cute-btn yellow" id="m1-reset" style="font-size:16px; padding:8px 20px;">🔄 Reset</button>
    </div>
    <div id="m1-log" style="font-size:16px; text-align:center; min-height:24px; color:var(--purple-dark);"></div>
  `;

  // State
  const char = container.querySelector('#m1-char');
  const log = container.querySelector('#m1-log');
  const cmdBtns = container.querySelectorAll('#m1-commands button');
  const goBtn = container.querySelector('#m1-go');
  const resetBtn = container.querySelector('#m1-reset');

  let pos = 20;
  let commands = [];
  let stepsDone = 0;

  function resetModule1() {
    pos = 20;
    char.style.left = pos + 'px';
    commands = [];
    stepsDone = 0;
    log.textContent = '👆 Click commands to build your instruction list!';
    cmdBtns.forEach(b => b.classList.remove('used'));
    goBtn.disabled = false;
    goBtn.textContent = '▶ Run Code!';
    // Remove any 'completed' indicator
    const badge = document.querySelector('#module-page-module1 .completion-badge');
    if (badge) badge.classList.remove('show');
  }

  cmdBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      const action = btn.dataset.action;
      commands.push(action);
      btn.classList.add('used');
      log.textContent = `📋 Instructions: ${commands.map(c => {
        if (c === 'step') return '🚶Step';
        if (c === 'jump') return '🦘Jump';
        if (c === 'spin') return '🌀Spin';
        return '🐰Hop';
      }).join(' → ')}`;
    });
  });

  function runModule1() {
    if (commands.length === 0) {
      log.textContent = '😅 Add some instructions first!';
      return;
    }
    goBtn.disabled = true;
    stepsDone = 0;
    pos = 20;
    char.style.left = pos + 'px';
    log.textContent = '🏃 Running...';
    executeNextCommand();
  }

  function executeNextCommand() {
    if (stepsDone >= commands.length) {
      if (pos >= 260) {
        log.textContent = '🎉 Yay! Vibey reached the goal! Great coding!';
        completeModule('module1');
      } else {
        log.textContent = '😊 Vibey moved but didn\'t reach the goal — try more commands!';
        goBtn.disabled = false;
        goBtn.textContent = '▶ Run Code!';
      }
      return;
    }

    const cmd = commands[stepsDone];
    stepsDone++;

    // Animate
    if (cmd === 'step') { pos += 40; char.textContent = '🌟'; }
    else if (cmd === 'jump') { pos += 45; char.textContent = '🌟'; setTimeout(() => { char.textContent = '🌟'; }, 200); }
    else if (cmd === 'spin') { pos += 10; char.style.transform = 'rotate(360deg)'; setTimeout(() => { char.style.transform = ''; }, 300); }
    else if (cmd === 'hop') { pos += 60; char.textContent = '🌟'; }

    pos = Math.min(pos, 300);
    char.style.left = pos + 'px';
    log.textContent = `📋 Step ${stepsDone}/${commands.length}...`;

    setTimeout(executeNextCommand, 500);
  }

  goBtn.addEventListener('click', runModule1);
  resetBtn.addEventListener('click', resetModule1);

  // Initialize
  resetModule1();
}

// ============================================================
// MODULE 2: PATTERN MAKER
// ============================================================
function buildModule2(container) {
  const colors = [
    { name: 'Red',    hex: '#ff5e5e' },
    { name: 'Pink',   hex: '#ff6fb7' },
    { name: 'Purple', hex: '#b983ff' },
    { name: 'Blue',   hex: '#42a6ff' },
    { name: 'Teal',   hex: '#42e6d8' },
    { name: 'Green',  hex: '#7eda7e' },
    { name: 'Yellow', hex: '#ffd93d' },
    { name: 'Orange', hex: '#ff8c42' },
  ];

  container.innerHTML = `
    <p class="instruction">
      🎨 Pick colors and make a pattern! Then let the computer <strong>repeat</strong> it!
      <br><small style="opacity:0.6">Click a color, then click in the grid to place it.</small>
    </p>
    <div class="color-palette" id="m2-palette"></div>
    <div class="pattern-grid" id="m2-grid"></div>
    <div class="repeat-btn-area">
      <button class="cute-btn teal" id="m2-repeat">🔁 Repeat Pattern!</button>
      <button class="cute-btn yellow" style="font-size:16px; padding:8px 20px;" id="m2-clear">🗑 Clear</button>
    </div>
    <div id="m2-log" style="font-size:16px; text-align:center; min-height:24px;"></div>
  `;

  const palette = container.querySelector('#m2-palette');
  const grid = container.querySelector('#m2-grid');
  const repeatBtn = container.querySelector('#m2-repeat');
  const clearBtn = container.querySelector('#m2-clear');
  const log = container.querySelector('#m2-log');

  let selectedColor = colors[0].hex;
  let pattern = [];

  function renderPalette() {
    palette.innerHTML = '';
    colors.forEach(c => {
      const swatch = document.createElement('div');
      swatch.className = 'swatch' + (c.hex === selectedColor ? ' selected' : '');
      swatch.style.background = c.hex;
      swatch.addEventListener('click', () => {
        selectedColor = c.hex;
        renderPalette();
      });
      palette.appendChild(swatch);
    });
  }

  function renderGrid() {
    grid.innerHTML = '';
    if (pattern.length === 0) {
      grid.style.minHeight = '60px';
      grid.innerHTML = '<span style="opacity:0.4; font-size:14px;">👆 Click a color above, then click here to place it!</span>';
      return;
    }
    grid.style.minHeight = '';
    pattern.forEach((color, i) => {
      const cell = document.createElement('div');
      cell.className = 'cell filled';
      cell.style.background = color;
      cell.addEventListener('click', () => {
        pattern.splice(i, 1);
        renderGrid();
      });
      grid.appendChild(cell);
    });
  }

  // Click on grid to add
  grid.addEventListener('click', (e) => {
    if (e.target === grid || e.target.classList.contains('cell')) return;
    pattern.push(selectedColor);
    renderGrid();
    log.textContent = `🎯 ${pattern.length} colors in your pattern!`;
  });

  // Handle clicks on .cell by checking if click bubbled to grid
  // We'll handle cell removal within renderGrid.

  clearBtn.addEventListener('click', () => {
    pattern = [];
    renderGrid();
    log.textContent = '🔄 Pattern cleared! Start a new one!';
  });

  let repeatCount = 0;

  repeatBtn.addEventListener('click', () => {
    if (pattern.length === 0) {
      log.textContent = '😅 Make a pattern first!';
      return;
    }
    repeatCount++;
    const original = [...pattern];
    // Repeat the pattern twice
    for (let r = 0; r < 2; r++) {
      for (const c of original) {
        pattern.push(c);
      }
    }
    renderGrid();
    log.textContent = `🔄 Repeated ${repeatCount} time(s)! The computer remembers! 🤖`;

    // Check if they've repeated at least once and have a decent pattern
    if (repeatCount >= 1 && pattern.length >= 8) {
      setTimeout(() => {
        log.textContent = '🎉 You made a repeating pattern! Amazing coder!';
        completeModule('module2');
      }, 800);
    }
  });

  renderPalette();
  renderGrid();
  log.textContent = '🎨 Pick a color and click the grid to start your pattern!';
}

// ============================================================
// MODULE 3: DANCE PARTY
// ============================================================
function buildModule3(container) {
  const danceMoves = [
    { id: 'jump',  emoji: '⬆️', label: 'JUMP' },
    { id: 'spin',  emoji: '🔄', label: 'SPIN' },
    { id: 'wiggle',emoji: '💫', label: 'WIGGLE' },
    { id: 'wave',  emoji: '👋', label: 'WAVE' },
  ];

  container.innerHTML = `
    <p class="instruction">
      💃 Create a dance routine for your dancer! Add moves and press <strong>GO</strong>!
      <br><small style="opacity:0.6">Click dance moves to add them to your sequence.</small>
    </p>
    <div class="dance-stage" id="m3-stage">
      <div class="dancer" id="m3-dancer">🕺</div>
    </div>
    <div class="dance-cards" id="m3-cards"></div>
    <div style="display:flex; gap:8px; flex-wrap:wrap; justify-content:center;">
      <button class="cute-btn pink" id="m3-go">🎵 Dance!</button>
      <button class="cute-btn yellow" style="font-size:16px; padding:8px 20px;" id="m3-clear">🗑 Clear</button>
    </div>
    <div class="sequence-display" id="m3-seq">
      <span style="opacity:0.4; font-size:14px;">📋 Your routine will appear here...</span>
    </div>
    <div id="m3-log" style="font-size:16px; text-align:center; min-height:24px;"></div>
  `;

  const dancer = container.querySelector('#m3-dancer');
  const cards = container.querySelector('#m3-cards');
  const seqEl = container.querySelector('#m3-seq');
  const goBtn = container.querySelector('#m3-go');
  const clearBtn = container.querySelector('#m3-clear');
  const log = container.querySelector('#m3-log');

  let sequence = [];
  let dancing = false;

  function renderCards() {
    cards.innerHTML = '';
    danceMoves.forEach(move => {
      const card = document.createElement('button');
      card.className = 'card';
      card.innerHTML = `${move.emoji} ${move.label}`;
      card.addEventListener('click', () => {
        if (dancing) return;
        sequence.push(move.id);
        renderSequence();
        log.textContent = `➕ Added ${move.label}! (${sequence.length} moves)`;
      });
      cards.appendChild(card);
    });
  }

  function renderSequence() {
    if (sequence.length === 0) {
      seqEl.innerHTML = '<span style="opacity:0.4; font-size:14px;">📋 Your routine will appear here...</span>';
      return;
    }
    seqEl.innerHTML = sequence.map(id => {
      const m = danceMoves.find(d => d.id === id);
      return `<span class="seq-item">${m ? m.emoji : '❓'}</span>`;
    }).join('');
  }

  clearBtn.addEventListener('click', () => {
    if (dancing) return;
    sequence = [];
    renderSequence();
    log.textContent = '🗑 Routine cleared! Build a new one!';
    dancer.className = 'dancer';
  });

  async function danceRoutine() {
    if (sequence.length === 0) {
      log.textContent = '😅 Add some dance moves first!';
      return;
    }
    dancing = true;
    goBtn.disabled = true;
    log.textContent = '🎶 Dancing...';

    for (let i = 0; i < sequence.length; i++) {
      const move = sequence[i];
      dancer.className = 'dancer';

      await new Promise(resolve => {
        setTimeout(() => {
          dancer.classList.add(move);
          resolve();
        }, 100);
      });

      await new Promise(resolve => setTimeout(resolve, 500));
    }

    dancer.className = 'dancer';
    log.textContent = `🎉 Dance complete! (${sequence.length} moves) — Awesome choreography!`;
    dancing = false;
    goBtn.disabled = false;

    // Complete if they used at least 3 different moves
    const uniqueMoves = new Set(sequence);
    if (uniqueMoves.size >= 3 && sequence.length >= 4) {
      setTimeout(() => {
        log.textContent = '🏆 You\'re a dance choreographer! Amazing!';
        completeModule('module3');
      }, 600);
    }
  }

  goBtn.addEventListener('click', danceRoutine);

  renderCards();
  renderSequence();
  log.textContent = '💃 Click dance moves to build a routine, then press Dance!';
}

// ============================================================
// MODULE 4: COLOR MAGIC
// ============================================================
function buildModule4(container) {
  container.innerHTML = `
    <p class="instruction">
      🌈 Slide the colors to mix your own magic color! See how <strong>RGB</strong> works!
      <br><small style="opacity:0.6">Red + Green + Blue = Every color in the world!</small>
    </p>
    <div style="display:flex; gap:20px; align-items:center; flex-wrap:wrap; justify-content:center;">
      <div class="color-sliders" id="m4-sliders">
        <div class="slider-row">
          <label>🔴</label>
          <input type="range" class="r-slider" min="0" max="255" value="128" id="m4-r">
          <span class="val" id="m4-rv">128</span>
        </div>
        <div class="slider-row">
          <label>🟢</label>
          <input type="range" class="g-slider" min="0" max="255" value="80" id="m4-g">
          <span class="val" id="m4-gv">80</span>
        </div>
        <div class="slider-row">
          <label>🔵</label>
          <input type="range" class="b-slider" min="0" max="255" value="200" id="m4-b">
          <span class="val" id="m4-bv">200</span>
        </div>
      </div>
      <div style="display:flex; flex-direction:column; align-items:center; gap:8px;">
        <div class="color-preview" id="m4-preview" style="background:rgb(128,80,200);"></div>
        <div class="color-hex" id="m4-hex">#8050C8</div>
      </div>
    </div>
    <div id="m4-log" style="font-size:16px; text-align:center; min-height:24px;"></div>
    <div style="display:flex; gap:8px; justify-content:center; flex-wrap:wrap;">
      <button class="cute-btn purple" id="m4-surprise">🎲 Surprise Me!</button>
    </div>
  `;

  const rSlider = container.querySelector('#m4-r');
  const gSlider = container.querySelector('#m4-g');
  const bSlider = container.querySelector('#m4-b');
  const rv = container.querySelector('#m4-rv');
  const gv = container.querySelector('#m4-gv');
  const bv = container.querySelector('#m4-bv');
  const preview = container.querySelector('#m4-preview');
  const hexEl = container.querySelector('#m4-hex');
  const log = container.querySelector('#m4-log');
  const surpriseBtn = container.querySelector('#m4-surprise');

  let colorChanges = 0;

  function updateColor() {
    const r = parseInt(rSlider.value);
    const g = parseInt(gSlider.value);
    const b = parseInt(bSlider.value);
    rv.textContent = r;
    gv.textContent = g;
    bv.textContent = b;
    const color = `rgb(${r},${g},${b})`;
    const hex = '#' + [r,g,b].map(v => v.toString(16).padStart(2,'0')).join('').toUpperCase();
    preview.style.background = color;
    hexEl.textContent = hex;
    colorChanges++;
    if (colorChanges > 5) {
      log.textContent = `🎨 You've mixed ${colorChanges} colors! You're a color wizard! ✨`;
    }
    if (colorChanges >= 15) {
      setTimeout(() => {
        log.textContent = '🌈🌈🌈 You mastered the magic of colors! Incredible!';
        completeModule('module4');
      }, 400);
    }
  }

  rSlider.addEventListener('input', updateColor);
  gSlider.addEventListener('input', updateColor);
  bSlider.addEventListener('input', updateColor);

  surpriseBtn.addEventListener('click', () => {
    rSlider.value = Math.floor(Math.random() * 256);
    gSlider.value = Math.floor(Math.random() * 256);
    bSlider.value = Math.floor(Math.random() * 256);
    updateColor();
    log.textContent = '🎲 Surprise! A random color appeared! How cool is that?';
  });

  updateColor();
  log.textContent = '🎨 Slide the colors and watch the magic! Make your own color!';
}

// ============================================================
// MODULE 5: SHAPE BUILDER — Loops
// ============================================================
function buildModule5(container) {
  const shapes = ['🔵','🟣','🟢','🔶','❤️','💎','⭐','🌸'];

  container.innerHTML = `
    <p class="instruction">
      🔷 Place shapes in the grid, then use a <strong>loop</strong> to fill the rest!
      <br><small style="opacity:0.6">Click a shape, then click cells. The loop copies your pattern!</small>
    </p>
    <div style="display:flex; gap:6px; flex-wrap:wrap; justify-content:center; margin-bottom:6px;" id="m5-shape-picker"></div>
    <div class="shape-grid-container">
      <div class="shape-grid" id="m5-grid"></div>
    </div>
    <div class="loop-controls">
      <label>🔄 Repeat:</label>
      <input type="number" id="m5-loop-count" value="2" min="1" max="5">
      <button class="cute-btn teal" id="m5-run-loop">▶ Run Loop!</button>
      <button class="cute-btn yellow" style="font-size:16px; padding:8px 20px;" id="m5-clear">🗑 Clear</button>
    </div>
    <div id="m5-log" style="font-size:16px; text-align:center; min-height:24px;"></div>
  `;

  const picker = container.querySelector('#m5-shape-picker');
  const grid = container.querySelector('#m5-grid');
  const loopCount = container.querySelector('#m5-loop-count');
  const runBtn = container.querySelector('#m5-run-loop');
  const clearBtn = container.querySelector('#m5-clear');
  const log = container.querySelector('#m5-log');

  let selectedShape = shapes[0];
  let gridData = new Array(16).fill(null);
  let filledCount = 0;
  let loopRan = false;

  // Shape picker
  shapes.forEach(s => {
    const btn = document.createElement('button');
    btn.textContent = s;
    btn.style.cssText = `
      font-size:24px; width:42px; height:42px; border:3px solid transparent;
      border-radius:10px; cursor:pointer; transition:all 0.2s;
      background:${s === selectedShape ? '#e8e0f0' : '#fff'};
      border-color:${s === selectedShape ? '#b983ff' : '#ddd'};
    `;
    btn.addEventListener('click', () => {
      selectedShape = s;
      picker.querySelectorAll('button').forEach(b => {
        b.style.background = '#fff';
        b.style.borderColor = '#ddd';
      });
      btn.style.background = '#e8e0f0';
      btn.style.borderColor = '#b983ff';
    });
    picker.appendChild(btn);
  });

  function renderGrid() {
    grid.innerHTML = '';
    gridData.forEach((cell, i) => {
      const div = document.createElement('div');
      div.className = 's-cell' + (cell ? ' filled' : '');
      div.textContent = cell || '';
      div.addEventListener('click', () => {
        gridData[i] = selectedShape;
        renderGrid();
        filledCount = gridData.filter(c => c !== null).length;
        log.textContent = `🎯 Placed ${selectedShape} (${filledCount} cells filled)`;
      });
      grid.appendChild(div);
    });
  }

  clearBtn.addEventListener('click', () => {
    gridData = new Array(16).fill(null);
    filledCount = 0;
    loopRan = false;
    renderGrid();
    log.textContent = '🗑 Grid cleared! Place some shapes to start!';
  });

  runBtn.addEventListener('click', () => {
    const filledCells = gridData.map((val, idx) => val !== null ? { idx, val } : null).filter(Boolean);
    if (filledCells.length === 0) {
      log.textContent = '😅 Place at least one shape first!';
      return;
    }
    const repeats = parseInt(loopCount.value) || 2;

    // Find the pattern: we copy the arrangement of filled cells
    // We look at the non-null positions and replicate their shapes
    const patternPositions = filledCells.map(f => ({ idx: f.idx, val: f.val }));

    // Clear and fill based on pattern
    gridData = new Array(16).fill(null);

    // Place original
    for (const p of patternPositions) {
      gridData[p.idx] = p.val;
    }

    // Now "loop" to fill remaining cells
    // Strategy: for each non-empty cell, repeat its shape in a "copy" pattern
    // offset by grid width * repeat or +1 offset
    let copies = 0;
    for (let r = 0; r < repeats; r++) {
      for (const p of patternPositions) {
        // Offset logic: copy to next column (if space) or next row
        let newIdx = p.idx + (r + 1);
        if (newIdx >= 16) newIdx = newIdx % 16 + (Math.floor(newIdx / 16) * 4) % 16;
        if (newIdx < 16 && gridData[newIdx] === null) {
          gridData[newIdx] = p.val;
          copies++;
        }
        // Also try offset by 4 (down)
        newIdx = p.idx + (r + 1) * 4;
        if (newIdx < 16 && gridData[newIdx] === null) {
          gridData[newIdx] = p.val;
          copies++;
        }
      }
    }

    renderGrid();
    loopRan = true;
    filledCount = gridData.filter(c => c !== null).length;
    log.textContent = `🔄 Loop ran ${repeats} time(s)! Filled ${filledCount} cells total!`;

    if (filledCount >= 10) {
      setTimeout(() => {
        log.textContent = '🎉 Loops are powerful! You filled the grid like a pro! 🤖';
        completeModule('module5');
      }, 600);
    }
  });

  renderGrid();
  log.textContent = '🔷 Pick a shape, click cells, then run a loop to fill the rest!';
}
